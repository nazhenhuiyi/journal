name: Android Release

on:
  push:
    tags:
      - "mobile-v*"

permissions:
  contents: write

jobs:
  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      TAG_NAME: ${{ github.ref_name }}
      APK_PATH: builds/qieliu-${{ github.ref_name }}.apk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare build directory
        run: mkdir -p builds

      - name: Verify Expo token
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "${EXPO_TOKEN}" ]; then
            echo "::error title=Missing EXPO_TOKEN secret::Add an Expo access token named EXPO_TOKEN to repository secrets before pushing a mobile-v* tag."
            exit 1
          fi

      - name: Build Android APK
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          pnpm dlx eas-cli@20.1.0 build \
            --local \
            --platform android \
            --profile preview \
            --output "../../${APK_PATH}" \
            --non-interactive

      - name: Create release notes
        run: |
          {
            echo "Tag: ${TAG_NAME}"
            echo "Commit: ${GITHUB_SHA}"
            echo "Android package: app.zilin.journal"
            echo
            echo "This is a directly installable Android APK for testing."
          } > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${TAG_NAME}" "${APK_PATH}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${TAG_NAME}" \
            --notes-file release-notes.md \
            --verify-tag
