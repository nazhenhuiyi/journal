appId: ${APP_ID}
env:
  MURMUR_TEXT: Mobile E2E murmur saved from Maestro
---
- runFlow: _open-expo.yaml
- tapOn:
    id: murmur-count-button
- tapOn:
    id: murmur-draft-input
- inputText: ${MURMUR_TEXT}
- tapOn:
    id: add-murmur-button
    enabled: true
- assertVisible: ${MURMUR_TEXT}
- tapOn:
    point: "50%,12%"
- tapOn:
    point: "50%,12%"
- tapOn:
    id: journal-list-button
- assertVisible: 日记列表
- assertVisible: 1 条碎碎念
- tapOn:
    id: back-to-today-button
- tapOn:
    id: review-button
- assertVisible: 回顾
- assertVisible: 碎碎念
