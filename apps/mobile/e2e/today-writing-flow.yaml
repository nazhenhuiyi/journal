appId: ${APP_ID}
env:
  MURMUR_TEXT: mb
---
- runFlow: _set-home-mode-murmur.yaml
- tapOn:
    id: murmur-draft-input
- inputText: ${MURMUR_TEXT}
- tapOn:
    id: add-murmur-button
    enabled: true
- assertVisible: ${MURMUR_TEXT}
- hideKeyboard
- assertVisible:
    id: journal-list-button
- tapOn:
    id: journal-list-button
- extendedWaitUntil:
    visible:
      id: journal-list-page
    timeout: 10000
- tapOn:
    id: journal-list-row-today
- assertVisible:
    id: journal-list-button
- tapOn:
    id: journal-list-button
- extendedWaitUntil:
    visible:
      id: journal-list-page
    timeout: 10000
- tapOn:
    id: back-to-today-button
- tapOn:
    id: review-button
- extendedWaitUntil:
    visible:
      id: review-page
    timeout: 10000
- tapOn:
    id: back-to-today-button
- assertVisible:
    id: journal-list-button
