appId: ${APP_ID}
---
- runFlow: _launch-app-preserve-state.yaml
- tapOn:
    id: sync-status-button
- extendedWaitUntil:
    visible:
      id: sync-settings-page
    timeout: 10000
- tapOn:
    id: open-sync-configuration-button
- scrollUntilVisible:
    element:
      id: sync-remote-url-input
    direction: DOWN
    timeout: 10000
- tapOn:
    id: sync-remote-url-input
- eraseText: 160
- setClipboard: ${REMOTE_URL}
- pasteText
- hideKeyboard
- tapOn:
    id: sync-branch-input
- eraseText: 80
- setClipboard: ${SYNC_BRANCH}
- pasteText
- hideKeyboard
- scrollUntilVisible:
    element:
      id: sync-token-input
    direction: DOWN
    timeout: 10000
- tapOn:
    id: sync-token-input
- eraseText: 160
- setClipboard: ${SYNC_TOKEN}
- pasteText
- hideKeyboard
- scrollUntilVisible:
    element:
      id: save-sync-config-button
    direction: DOWN
    timeout: 10000
- tapOn:
    id: save-sync-config-button
    enabled: true
- tapOn:
    id: back-to-today-button
- extendedWaitUntil:
    visible:
      id: sync-settings-page
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: sync-now-button
    timeout: 180000
- openLink: journal://debug/sync-conflict-fixture?date=${SYNC_CONFLICT_DATE}&localText=${SYNC_CONFLICT_LOCAL_TEXT_ENCODED}
- extendedWaitUntil:
    visible:
      id: sync-settings-page
    timeout: 10000
