appId: ${APP_ID}
env:
  UNSAFE_REMOTE_URL: https://secret-token@github.com/example/journal-sync.git
---
- runFlow: _open-expo.yaml
- tapOn:
    id: sync-status-button
- assertVisible: 远端同步
- tapOn:
    id: open-sync-configuration-button
- tapOn:
    id: sync-remote-url-input
- eraseText: 200
- inputText: ${UNSAFE_REMOTE_URL}
- hideKeyboard
- tapOn:
    id: save-sync-config-button
    enabled: true
- extendedWaitUntil:
    visible: 同步配置没有保存成功。
    timeout: 12000
