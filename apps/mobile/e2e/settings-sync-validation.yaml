appId: ${APP_ID}
env:
  EXPO_URL: exp://127.0.0.1:8081
  UNSAFE_REMOTE_URL: https://secret-token@github.com/example/journal-sync.git
---
- runFlow: _open-expo.yaml
- tapOn:
    id: settings-button
- assertVisible: 设置
- tapOn:
    id: sync-remote-url-input
- eraseText: 200
- inputText: ${UNSAFE_REMOTE_URL}
- tapOn:
    id: Return
- tapOn:
    id: save-sync-config-button
    enabled: true
- extendedWaitUntil:
    visible: 同步配置没有保存成功。
    timeout: 12000
