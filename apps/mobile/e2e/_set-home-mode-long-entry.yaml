appId: ${APP_ID}
---
- runFlow: _launch-app.yaml
- tapOn:
    id: settings-button
- extendedWaitUntil:
    visible:
      id: home-mode-preference
    timeout: 10000
- runFlow:
    when:
      visible:
        id: home-mode-murmur-active
    commands:
      - tapOn:
          id: home-mode-preference
      - extendedWaitUntil:
          visible:
            id: home-mode-long-entry-active
          timeout: 10000
- tapOn:
    id: back-to-today-button
- extendedWaitUntil:
    visible:
      id: long-entry-input
    timeout: 10000
