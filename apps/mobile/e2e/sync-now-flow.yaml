appId: ${APP_ID}
env:
  MURMUR_TEXT: Mobile E2E sync now saved from Maestro
---
- runFlow: _open-expo.yaml
- tapOn:
    id: murmur-count-button
- tapOn:
    id: murmur-draft-input
- inputText: ${MURMUR_TEXT}
- pressKey: Enter
- tapOn:
    id: add-murmur-button
    enabled: true
- tapOn:
    point: "50%,12%"
- tapOn:
    point: "50%,12%"
- tapOn:
    id: sync-status-button
- assertVisible: 远端同步
- extendedWaitUntil:
    visible: 立即同步
    timeout: 30000
- tapOn:
    id: sync-now-button
    enabled: true
- extendedWaitUntil:
    visible: 同步完成
    timeout: 60000
- tapOn:
    id: back-to-today-button
- assertVisible: 已同步
