appId: ${APP_ID}
env:
  EXPO_URL: exp://127.0.0.1:8081
  ENTRY_TEXT: Mobile E2E sync now saved from Maestro
---
- runFlow: _open-expo.yaml
- tapOn:
    id: long-entry-input
- inputText: ${ENTRY_TEXT}
- tapOn:
    id: settings-button
- assertVisible: 设置
- tapOn:
    id: sync-remote-url-input
- eraseText: 200
- inputText: ${REMOTE_URL}
- tapOn:
    id: Return
- tapOn:
    id: sync-branch-input
- eraseText
- inputText: ${SYNC_BRANCH}
- tapOn:
    id: Return
- tapOn:
    id: sync-token-input
- inputText: ${SYNC_TOKEN}
- tapOn:
    id: Return
- tapOn:
    id: sync-now-button
    enabled: true
- extendedWaitUntil:
    visible: 同步完成
    timeout: 60000
- tapOn:
    id: back-to-today-button
- assertVisible: 已同步
