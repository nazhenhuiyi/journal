appId: ${APP_ID}
env:
  MURMUR_TEXT: Mobile E2E sync now saved from Maestro
---
- runFlow: _launch-app.yaml
- extendedWaitUntil:
    visible: 已同步
    timeout: 180000
- tapOn:
    id: murmur-count-button
- tapOn:
    id: murmur-draft-input
- inputText: ${MURMUR_TEXT}
- pressKey: Enter
- tapOn:
    id: add-murmur-button
    enabled: true
- assertVisible: ${MURMUR_TEXT}
- hideKeyboard
- tapOn:
    id: back-to-today-button
- extendedWaitUntil:
    visible:
      id: sync-status-button
    timeout: 10000
- tapOn:
    id: sync-status-button
- extendedWaitUntil:
    visible:
      id: sync-settings-page
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: sync-now-button
    timeout: 30000
- tapOn:
    id: sync-now-button
    enabled: true
- extendedWaitUntil:
    visible: 同步完成
    timeout: 180000
- tapOn:
    id: back-to-today-button
- assertVisible: 已同步
